# SecondWind node installer preseed — safe dual-boot defaults.
#
# Mirrors docs/FIRST-SETUP.md: install ONLY into the largest continuous free
# space (the space the user freed beforehand from their existing OS), never
# touching other partitions or disks. Values here are choices of the guided
# flow, not machine specifics.

# Locale/keyboard: asked interactively (beginners must see them).

# Partitioning: guided, biggest free space. The SecondWind recipe creates
# the Linux system plus the node data partition (labeled SECONDWIND_DATA,
# exposed to the host over iSCSI in v0.2). Sizes are proportions of the
# free space the user chose to give SecondWind — nothing machine-specific.
# The installer refuses to run destructive steps without the user's
# on-screen confirmation, which stays enabled.
d-i partman-auto/init_automatically_partition select biggest_free
d-i partman-auto/method string regular
d-i partman-auto/expert_recipe string \
    secondwind :: \
        10000 12000 16000 ext4 \
            $primary{ } method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } mountpoint{ / } \
        . \
        1000 2000 200% linux-swap \
            method{ swap } format{ } \
        . \
        5000 10000 -1 ext4 \
            method{ format } format{ } \
            use_filesystem{ } filesystem{ ext4 } label{ SECONDWIND_DATA } \
        .
d-i partman-auto/choose_recipe select secondwind

# Base system: standard utilities only; SecondWind services come from the
# live image content.
tasksel tasksel/first multiselect standard

# GRUB: install to the primary drive's boot area and show the existing OS in
# the menu (dual boot is the default path; SecondWind stays default entry).
d-i grub-installer/only_debian boolean false
d-i grub-installer/with_other_os boolean true

# After install, make sure os-prober keeps the existing OS visible on
# updates (recent GRUB disables it by default).
d-i preseed/late_command string \
    in-target sh -c "echo 'GRUB_DISABLE_OS_PROBER=false' >> /etc/default/grub && update-grub"
