name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Formatting (workspace)
        run: cargo fmt --check
      - name: Formatting (companion)
        run: cargo fmt --check
        working-directory: companion/src-tauri
      - name: Clippy, warnings denied (workspace)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: ShellCheck node scripts (errors fail; warnings reported)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq shellcheck
          shellcheck scripts/node/*.sh node-image/live-build/build.sh \
            node-image/live-build/config/hooks/normal/*.hook.chroot || true
          shellcheck -S error scripts/node/*.sh node-image/live-build/build.sh \
            node-image/live-build/config/hooks/normal/*.hook.chroot

  cargo:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo test --workspace
      - name: Companion tests
        run: cargo test --lib
        working-directory: companion/src-tauri
      - name: Clippy, warnings denied (companion)
        run: cargo clippy --all-targets -- -D warnings
        working-directory: companion/src-tauri
      - name: PSScriptAnalyzer host scripts
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = Invoke-ScriptAnalyzer -Path scripts/windows -Recurse -Severity Error
          $results | Format-Table -AutoSize
          if ($results) { exit 1 }

  node-binaries:
    # The agent/kiosk ship on Linux; make sure they build there too.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test --workspace

  audit:
    # Known-vulnerability scan over both lockfiles.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
